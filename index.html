<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewsWire · 市场日报</title>
<style>
  :root{--paper:#f5f6f9;--card:#fff;--ink:#151a21;--ink2:#586173;--ink3:#9098a6;--line:#e7eaf0;--accent:#2456d6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);line-height:1.72;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:64px 22px 90px}
  .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink3);font-weight:600}
  h1{font-size:28px;line-height:1.2;font-weight:760;letter-spacing:-.01em;margin:10px 0 12px}
  p{color:var(--ink2);margin:0 0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:22px 0}
  .card h2{font-size:13px;letter-spacing:.06em;color:var(--ink3);margin:0 0 10px;font-weight:600}
  a{color:var(--accent);text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:baseline}
  .k{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:var(--ink3);min-width:52px}
  code{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12.5px;background:#eef1f6;
    border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--ink)}
  footer{margin-top:40px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--ink3)}
</style>
<body>
<div class="wrap">
  <div class="eyebrow">NEWSWIRE</div>
  <h1>市场日报</h1>
  <p>A 股 · 美股 · 港股 · Crypto 跨市场每日整合。引擎自动采集金十 / investing / Market Trend，
     Opus 逐条评估板块与重要度，同一事件聚合成 story，输出报道 · 分析 · Key Takeaway，零编造校验。</p>

  <div class="card">
    <h2>订阅</h2>
    <div class="row"><span class="k">RSS</span><a href="feed.xml">feed.xml</a></div>
    <p style="margin:10px 0 0;font-size:13.5px">在 Reeder / NetNewsWire 等阅读器里添加
       <code>https://melroseee-e.github.io/market-daily/feed.xml</code></p>
  </div>

  <footer>引擎自动采集 · AI 辅助整理,以原始来源为准 · 仅供研究</footer>
</div>
</body>
</html>
